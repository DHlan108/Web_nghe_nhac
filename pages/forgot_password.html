<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Music Web</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/auth_forgot_password.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="inner-box">
                <div class="form">
                    <h2>Đặt lại mật khẩu</h2>
                    
                    <input type="email" id="reset-email" placeholder="Nhập Email của bạn">
                    <input type="password" id="new-password" placeholder="Mật khẩu mới">
                    
                    <input type="submit" id="btnReset" onclick="event.preventDefault(); xulyQuenMatKhau()" value="Xác nhận" />
                    
                    <div class="btns">
                        <span>Nhớ ra rồi? <a href="login.html">Quay lại đăng nhập</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
