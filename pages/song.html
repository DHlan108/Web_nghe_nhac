<!DOCTYPE html>
<html lang="vi">
    <head>
    <meta charset="UTF-8">
    <title>My Music</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/component.css">
    <link rel="stylesheet" href="../css/song.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>



<body>

    <div class="layout">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div id="navbar-container"></div>

        <!-- CONTENT -->
        <main class="content">
            <div id="admin-tools"></div>
       

            <!-- Danh mục -->
            <section id="feature" class="section-p1">
                <div class="fe-box-1">
                    <h6>Bài Hát Nổi Bật</h6>
                </div>

                <div class="fe-box-2">
                    <h6>Bài Hát Mới Ra</h6>
                </div>

                <div class="fe-box-3">
                    <h6>Tất Cả Bài Hát</h6>
                </div>
            </section>

    <!-- Bài hát nổi bật-->
        <section id="featured-songs" class="song-section section-p1">
            <h2>Bài Hát Nổi Bật</h2>

            <div class="pro-container" id="featured-list">

            </div>

        </section>

    <!-- Bài hát mới ra -->
        <section id="new-songs" class="song-section section-p1">
            <h2>Bài Hát Mới Ra</h2>
            <div class="pro-container" id="new-list">
            </div>
        </section>

    <!-- Tất cả bài hát -->
        <section id="all-songs" class="song-section section-p1">
            <h2>Tất Cả Bài Hát</h2>
            <div class="pro-container" id="all-list">

            </div>

        </section>


</main>

</div>
</div>
    <script src="../js/loadComponent.js"></script>
    <script src="../js/song.js"></script>

            
</body>
</html>
